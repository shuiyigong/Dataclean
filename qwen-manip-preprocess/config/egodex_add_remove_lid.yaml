schema:
  embodiment: egodex
  layout: pose_gripper
  canonical_dim: 14
  state_column: observation.state
  action_column: action

dataset:
  root: /mnt/project_rlinf/runze/egodex_part1/add_remove_lid_lerobot_v21
  embodiment: egodex
  robot_type: egodex
  fps: 30
  total_episodes: 2565

pipeline:
  num_workers: 64
  output_mode: report
  min_episode_length: 15
  action_zero_epsilon: 1.0e-4
  stage1_post_zero_grace_frames: 30
  discard_short_prefix: false

preprocess:
  action_from_state: false

stage1:
  stats:
    recompute: true
    cache_path: cache/stage1_global_stats.npz
  smoothing:
    median_kernel: 5
    savgol_window: 11
    savgol_polyorder: 3
  thresholds:
    k_residual: 60.0
    k_accel: 60.0
    k_jerk: 60.0
    percentile_floor: 99.999
  hard_limits:
    joint_abs_max: 3.5
    ee_position_max: 2.0
    rpy_abs_max: 3.14159265
    gripper_max: 1.0
  exclusion:
    mode: validity_mask
    frame_removal:
      max_cluster_length: 4
      min_cluster_length_for_abnormal: 1
    episode_discard:
      min_cluster_length: 50
      min_cluster_frame_jump: 0.25
      on_hard_limit_violation: true

stage2:
  action_type: absolute
  shared_dims:
    state_key: observation.state
    action_key: action
    num_dims: 14
  smoothing:
    median_kernel: 5
    savgol_window: 11
    savgol_polyorder: 3
  alignment:
    max_lag_frames: 5
    diff_epsilon: 1.0e-4
    min_active_samples: 10
  thresholds:
    da_per_dim: 0.65
    da_episode_mean: 0.65
  exclusion:
    mode: episode_discard

stage3:
  stats:
    recompute: true
    cache_path: cache/global_stats.npz
    num_histogram_bins: 65536
  alpha: 0.35
  exempt_dims:
    gripper_state: [6, 13]
    gripper_action: [6, 13]
    rpy_state: [3, 4, 5, 10, 11, 12]
    rpy_action: [3, 4, 5, 10, 11, 12]
  hard_limits:
    joint: [-3.5, 3.5]
    ee_xyz: [-2.0, 2.0]
    rpy: [-3.15, 3.15]
    gripper: [-0.01, 1.0]
  quaternion:
    norm_min: 0.95
    norm_max: 1.05
    component_abs_max: 1.01
  exclusion:
    mode: frame_removal
    min_episode_length: 15
    validity_mask: prefix_truncate

stage4:
  enabled: true
  max_static_steps: 5
  change_epsilon: 0.0

stage5:
  enabled: false
  reference_frame: camera_top_frame0
  # Per-dataset rotation (radians, extrinsic xyz) so +X aligns with robot forward.
  rotation_correction_euler_xyz: [0.0, -1.5707963267948966, 0.0]
  egodex_extrinsics_column: observation.camera_extrinsics_world
